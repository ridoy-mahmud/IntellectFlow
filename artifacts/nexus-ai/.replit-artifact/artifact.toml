kind = "web"
previewPath = "/"
title = "NEXUS AI"
version = "1.0.0"
id = "artifacts/nexus-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22706
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/nexus-ai run dev"

[services.env]
PORT = "22706"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/nexus-ai", "run", "build"]
publicDir = "artifacts/nexus-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
